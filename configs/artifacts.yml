# Artifact manifest for nested-dichotomy tree-space analysis.
#
# Each entry defines one artifact saved to cache_nd/.
# Run: python scripts/make_artifacts.py --all
#      python scripts/make_artifacts.py --target art_1_C6_N945_s0_d2
#
# Fields
# ------
# name        : unique artifact identifier (matches cache filename stem)
# C           : number of classes
# N           : number of trees sampled (ignored when exhaustive: true)
# seed        : random seed for MDS and KMeans
# dim         : MDS embedding dimension
# exhaustive  : true when all trees are enumerated (C <= 7)
# description : plain-English note for readers

artifacts:

  - name: art_1_C4_N15_s0_d2
    C: 4
    N: 15
    seed: 0
    dim: 2
    exhaustive: true
    description: "4-class full enumeration (15 trees)"

